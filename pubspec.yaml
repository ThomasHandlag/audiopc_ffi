name: audiopc_ffi
description: "A Rust-powered Flutter FFI audio plugin for local file playback, direct URL streaming, and audio processing via a CPAL backend."
version: 0.0.3
homepage: https://app.bustify.dev
repository: https://github.com/thomashandlag/audiopc_ffi

environment:
  sdk: ^3.11.1
  flutter: '>=3.7.0'

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.2.0
  hooks: ^1.0.0
  native_toolchain_rust: ^1.0.3
  audiopc_interface: ^0.0.1+4

dev_dependencies:
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  test: ^1.28.0


flutter:
  plugin:
    platforms:
      android:
        package: com.thugbn.audiopc_ffi
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
